name: civiccomplaints
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^10.1.0
  http: ^0.13.6
  shared_preferences: ^2.1.0
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari_Condensed-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari_Condensed-Bold.ttf
        - asset: assets/fonts/NotoSansDevanagari-VariableFont_wdth,wght_1.ttf
          weight: 700
          
 